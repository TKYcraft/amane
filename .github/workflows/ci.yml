name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Vet
        run: go vet ./...
      - name: Unit tests (race)
        run: go test -race ./...
      - name: Cross builds
        run: |
          GOOS=linux  GOARCH=amd64 go build ./...
          GOOS=linux  GOARCH=arm64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=darwin GOARCH=amd64 go build ./...

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y iperf3 ethtool
      - name: Build lab binary
        run: mkdir -p /tmp/amane-lab && go build -o /tmp/amane-lab/amane ./cmd/amane
      - name: Basic connectivity
        run: sudo bash test/lab/scenario_basic.sh
      - name: Failover
        run: sudo bash test/lab/scenario_failover.sh
      - name: Bonding aggregation
        run: sudo bash test/lab/scenario_bonding.sh
