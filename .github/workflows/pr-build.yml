name: PR Build

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute VERSION
        id: v
        run: |
          date=$(git show -s --format=%cd --date=format:%Y%m%d HEAD)
          sha=$(git rev-parse --short=7 HEAD)
          version="${date}-${sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binaries via Docker
        run: |
          docker buildx build \
            --build-arg VERSION=${{ steps.v.outputs.version }} \
            -o dist/build/ .
          ls -la dist/build/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: amane-pr${{ github.event.pull_request.number }}-${{ steps.v.outputs.version }}
          path: dist/build/*
          retention-days: 3
