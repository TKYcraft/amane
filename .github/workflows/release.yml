name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag existence check + commit date derivation

      - name: Compute VERSION
        id: v
        run: |
          date=$(git show -s --format=%cd --date=format:%Y%m%d HEAD)
          sha=$(git rev-parse --short=7 HEAD)
          version="${date}-${sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binaries via Docker
        run: |
          docker buildx build \
            --build-arg VERSION=${{ steps.v.outputs.version }} \
            -o dist/build/ .
          ls -la dist/build/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: amane-${{ steps.v.outputs.version }}
          path: dist/build/*
          retention-days: 30

      - name: Check whether tag already exists
        id: check
        env:
          TAG: ${{ steps.v.outputs.version }}
        run: |
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists; skipping tag & release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.v.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.version }}
          files: |
            dist/build/amane-*
            dist/build/SHA256SUMS
          generate_release_notes: true
